name: Build Extension Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .c7s.zip
        run: zip -r gg_ir77_mcversionchooser.c7s.zip Metadata.toml frontend/ backend/ migrations/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: gg_ir77_mcversionchooser.c7s.zip
          generate_release_notes: true
